services:
  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Express Backend Service
  backend:
    build:
      context: ./taskflow-backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow_db
      JWT_ACCESS_SECRET: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      JWT_REFRESH_SECRET: 02529484c8038f4e75a6a5aee471cc2075d11c5ebbf0644bffdf2ab16189818b664894f5046c14779c45859f0afddc1e1950ac8c153fccf4a5807357e0912a96
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy

  # React Frontend Service (Nginx)
  frontend:
    build:
      context: ./taskflow-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api/v1
    container_name: taskflow_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
